    function TransactionsPage() {
      const { user } = React.useContext(AuthContext);
      const toast = React.useContext(ToastContext);
      const [transactions, setTransactions] = React.useState({ items: [], total: 0 });
      const [loading, setLoading] = React.useState(true);
      const [showImport, setShowImport] = React.useState(false);
      const [importResult, setImportResult] = React.useState(null);
      const [tab, setTab] = React.useState('all');

      const load = () => {
        const params = tab === 'anomalies' ? '?anomalies_only=true' : '';
        API.get(`/transactions${params}`).then(setTransactions).finally(() => setLoading(false));
      };
      React.useEffect(() => { load(); }, [tab]);

      async function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const res = await API.upload('/transactions/import', file);
          setImportResult(res);
          toast.show(`Imported ${res.imported} transactions`);
          load();
        } catch (err) { toast.show(err.message, 'error'); }
      }

      const columns = [
        { key: 'vin', label: 'VIN', render: v => <span className="font-mono text-xs">{v}</span> },
        { key: 'campaign_code', label: 'Code', render: v => <span className="font-mono font-bold text-flare-red">{v}</span> },
        { key: 'dealer_name', label: 'Dealer' },
        { key: 'retail_date', label: 'Retail Date' },
        { key: 'support_amount', label: 'Amount', render: v => v ? `$${Number(v).toLocaleString()}` : '-' },
        { key: 'payment_status', label: 'Status', render: v => <Badge variant={v}>{v}</Badge> },
        { key: 'anomaly_flag', label: 'Anomaly', render: v => v ? <span className="text-xs text-error">{v}</span> : '' },
      ];

      if (loading) return <Spinner />;

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold text-onyx">Transactions</h1>
            {user.role === 'admin' && (
              <div className="flex gap-2">
                <label className="cursor-pointer">
                  <Button variant="secondary" onClick={() => document.getElementById('file-upload').click()}>
                    Upload Daily Report
                  </Button>
                  <input id="file-upload" type="file" accept=".xlsx,.xls" onChange={handleFileUpload} className="hidden" />
                </label>
              </div>
            )}
          </div>
          {importResult && (
            <Card className="p-4 mb-4 bg-success/5 border-success/20">
              <p className="text-sm font-medium text-success">
                Import Complete: {importResult.imported} imported, {importResult.duplicates} duplicates, {importResult.anomalies} anomalies, {importResult.errors} errors
              </p>
            </Card>
          )}
          <div className="flex gap-2 mb-4">
            <button onClick={() => setTab('all')} className={`px-3 py-1.5 rounded-full text-sm ${tab === 'all' ? 'bg-onyx text-white' : 'bg-dove text-iron-smoke'}`}>All ({transactions.total})</button>
            <button onClick={() => setTab('anomalies')} className={`px-3 py-1.5 rounded-full text-sm ${tab === 'anomalies' ? 'bg-error text-white' : 'bg-dove text-iron-smoke'}`}>Anomalies</button>
          </div>
          <Card>
            <DataTable columns={columns} data={transactions.items} />
          </Card>
        </div>
      );
    }

    // ==================== Pay Files Page ====================
    function PayFilesPage() {
      const toast = React.useContext(ToastContext);
      const [payfiles, setPayfiles] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [period, setPeriod] = React.useState('2026-04');
      const [generating, setGenerating] = React.useState(false);

      const load = () => API.get('/payfiles').then(setPayfiles).finally(() => setLoading(false));
      React.useEffect(() => { load(); }, []);

      async function handleGenerate() {
        setGenerating(true);
        try {
          await API.post('/payfiles/generate', { period });
          toast.show('Pay file generated');
          load();
        } catch (e) { toast.show(e.message, 'error'); }
        finally { setGenerating(false); }
      }

      async function handleSubmit(id) {
        try { await API.post(`/payfiles/${id}/submit`); toast.show('Pay file submitted'); load(); }
        catch (e) { toast.show(e.message, 'error'); }
      }

      async function handleConfirm(id) {
        try { await API.post(`/payfiles/${id}/confirm`); toast.show('Pay file confirmed — transactions marked as paid'); load(); }
        catch (e) { toast.show(e.message, 'error'); }
      }

      if (loading) return <Spinner />;

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold text-onyx">Pay Files</h1>
            <div className="flex items-center gap-3">
              <Input type="month" value={period} onChange={e => setPeriod(e.target.value)} />
              <Button onClick={handleGenerate} disabled={generating}>
                {generating ? 'Generating...' : 'Generate Pay File'}
              </Button>
            </div>
          </div>
          <div className="space-y-4">
            {payfiles.map(pf => (
              <Card key={pf.id} className="p-5">
                <div className="flex items-center justify-between">
                  <div>
                    <h3 className="font-semibold text-onyx">Period: {pf.period}</h3>
                    <p className="text-sm text-silver-dust">Generated: {pf.generated_date?.split('.')[0] || 'N/A'}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-xl font-bold text-onyx">${Number(pf.total_amount).toLocaleString()}</p>
                    <p className="text-sm text-silver-dust">{pf.total_units} units</p>
                  </div>
                  <div className="flex items-center gap-2">
                    <Badge variant={pf.status}>{pf.status}</Badge>
                    <Button size="sm" variant="outline" onClick={() => window.open(`/api/payfiles/${pf.id}/download`, '_blank')}>Download</Button>
                    {pf.status === 'draft' && <Button size="sm" onClick={() => handleSubmit(pf.id)}>Submit</Button>}
                    {pf.status === 'submitted' && <Button size="sm" variant="secondary" onClick={() => handleConfirm(pf.id)}>Confirm Paid</Button>}
                  </div>
                </div>
              </Card>
            ))}
            {!payfiles.length && <EmptyState message="No pay files generated yet" />}
          </div>
        </div>
      );
    }

      const [editId, setEditId] = React.useState(null);

        model_year: 'MY26', body_style: 'station_wagon', trim: 'Base', special_edition: '', msrp: '', active: true

        setEditId(p.id);

          model_year: p.model_year, body_style: p.body_style, trim: p.trim,

          });
          toast.show('Product updated');
          setEditId(null);

        e.preventDefault();
        try {

            ...createForm,
            msrp: createForm.msrp ? parseFloat(createForm.msrp) : null,

                          </td>
                          <td className="px-4 py-2">
                            <select value={editForm.body_style} onChange={e => setEditForm(f => ({...f, body_style: e.target.value}))}
                              className="w-full px-2 py-1 border border-mushroom rounded text-sm">{bodyOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select>
                          </td>
                          <td className="px-4 py-2">
                            {/* Free-form text so the admin can enter
                                a trim that hasn't been pre-listed yet
                                (e.g. a new edition partway through the
                                model year). The datalist gives
                                autocomplete from the trims we already
                                know about. */}
                            <input value={editForm.trim} onChange={e => setEditForm(f => ({...f, trim: e.target.value}))}
                              list="product-trim-list"
                              className="w-full px-2 py-1 border border-mushroom rounded text-sm" placeholder="e.g. Base" />
                          </td>
                          <td className="px-4 py-2">
                            <input value={editForm.special_edition} onChange={e => setEditForm(f => ({...f, special_edition: e.target.value}))}
                              className="w-full px-2 py-1 border border-mushroom rounded text-sm" placeholder="Optional" />
                          </td>
                          <td className="px-4 py-2">
                            <input type="number" value={editForm.msrp} onChange={e => setEditForm(f => ({...f, msrp: e.target.value}))}
                              className="w-full px-2 py-1 border border-mushroom rounded text-sm" placeholder="0" />
                          </td>
                          <td className="px-4 py-2">
                            <input type="checkbox" checked={editForm.active} onChange={e => setEditForm(f => ({...f, active: e.target.checked}))} />
                          </td>
                          <td className="px-4 py-2 flex gap-1">
                            <Button size="sm" onClick={() => saveEdit(p.id)}>Save</Button>
                            <Button size="sm" variant="ghost" onClick={() => setEditId(null)}>Cancel</Button>
                          </td>
                        </React.Fragment>
                      ) : (
                        <React.Fragment>
                          <td className="px-4 py-3 text-sm">{p.model_year}</td>
                          <td className="px-4 py-3 text-sm">{(p.body_style || '').replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())}</td>
                          <td className="px-4 py-3 text-sm font-medium">{p.trim}</td>
                          <td className="px-4 py-3 text-sm text-silver-dust">{(p.special_edition || '').replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())}</td>
                          <td className="px-4 py-3 text-sm font-medium">{p.msrp ? `$${Number(p.msrp).toLocaleString()}` : '-'}</td>
                          <td className="px-4 py-3 text-sm">{p.active ? <span className="text-success">Active</span> : <span className="text-silver-dust">Inactive</span>}</td>
                          <td className="px-4 py-3 flex gap-2">
                            <button onClick={() => startEdit(p)} className="text-xs text-iron-smoke hover:text-onyx hover:underline">Edit</button>
                            <button onClick={async () => {
                              if (!confirm(`Delete ${p.model_year} ${p.trim}?`)) return;
                              try {
                                const headers = {};
                                if (API.token) headers['Authorization'] = `Bearer ${API.token}`;
                                const res = await fetch(`/api/settings/products/${p.id}`, { method: 'DELETE', headers });
                                if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || 'Delete failed');
                                toast.show('Product deleted'); load();
                              } catch (e) { toast.show(e.message, 'error'); }
                            }} className="text-xs text-error/60 hover:text-error hover:underline">Delete</button>
                          </td>
                        </React.Fragment>
                      )}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
          <Modal open={showCreate} onClose={() => setShowCreate(false)} title="Add Product">
            <form onSubmit={handleCreate} className="space-y-3">
              <Select label="Model Year" value={createForm.model_year} onChange={e => setCreateForm(f => ({...f, model_year: e.target.value}))} options={myOpts} />
              <Select label="Body Style" value={createForm.body_style} onChange={e => setCreateForm(f => ({...f, body_style: e.target.value}))} options={bodyOpts} />
              <Input label="Trim" value={createForm.trim} onChange={e => setCreateForm(f => ({...f, trim: e.target.value}))} list="product-trim-list" placeholder="e.g. Base, Fieldmaster, or a new edition name" />
              <Input label="Special Edition (optional)" value={createForm.special_edition} onChange={e => setCreateForm(f => ({...f, special_edition: e.target.value}))} placeholder="e.g., arcane_works_detour" />
              <Input label="MSRP ($)" type="number" value={createForm.msrp} onChange={e => setCreateForm(f => ({...f, msrp: e.target.value}))} placeholder="e.g., 75000" />
              <div className="flex justify-end gap-2 pt-2">
                <Button variant="outline" onClick={() => setShowCreate(false)}>Cancel</Button>
                <Button type="submit">Add Product</Button>
              </div>
            </form>
          </Modal>
        </div>
      );
    }

    function UsersSettings() {
      const toast = React.useContext(ToastContext);
      const [users, setUsers] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [showCreate, setShowCreate] = React.useState(false);
      const [form, setForm] = React.useState({ username: '', password: '', name: '', role: 'retailer', region: '', dealer_id: '' });

      const load = () => API.get('/settings/users').then(setUsers).finally(() => setLoading(false));
      React.useEffect(() => { load(); }, []);

      async function handleCreate(e) {
        e.preventDefault();
        try {
          await API.post('/settings/users', form);
          toast.show('User created');
          setShowCreate(false);
          load();
        } catch (err) { toast.show(err.message, 'error'); }
      }

      const columns = [
        { key: 'username', label: 'Username' },
        { key: 'name', label: 'Name' },
        { key: 'role', label: 'Role', render: v => <Badge variant="default">{v}</Badge> },
        { key: 'region', label: 'Region', render: v => v ? <span className="capitalize">{v}</span> : '' },
        { key: 'active', label: 'Active', render: v => v ? '✓' : '✗' },
      ];

      if (loading) return <Spinner />;

      return (
        <div>
          <div className="flex justify-end mb-4">
            <Button size="sm" onClick={() => setShowCreate(true)}>+ Add User</Button>
          </div>
          <Card><DataTable columns={columns} data={users} /></Card>
          <Modal open={showCreate} onClose={() => setShowCreate(false)} title="Create User">
            <form onSubmit={handleCreate} className="space-y-3">
              <Input label="Username" value={form.username} onChange={e => setForm(f => ({...f, username: e.target.value}))} required />
              <Input label="Password" type="password" value={form.password} onChange={e => setForm(f => ({...f, password: e.target.value}))} required />
              <Input label="Name" value={form.name} onChange={e => setForm(f => ({...f, name: e.target.value}))} required />
              <Select label="Role" value={form.role} onChange={e => setForm(f => ({...f, role: e.target.value}))}
                options={[{value:'admin',label:'Admin'},{value:'rbm',label:'RBM'},{value:'retailer',label:'Retailer'}]} />
              <div className="flex justify-end gap-2 pt-2">
                <Button variant="outline" onClick={() => setShowCreate(false)}>Cancel</Button>
                <Button type="submit">Create</Button>
              </div>
            </form>
          </Modal>
        </div>
      );
    }

    function StackingSettings() {
      const [rules, setRules] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      React.useEffect(() => { API.get('/settings/stacking-rules').then(setRules).finally(() => setLoading(false)); }, []);

      if (loading) return <Spinner />;
      if (!rules) return null;

      const allTypes = ['bonus_cash', 'customer_cash', 'apr_cash', 'lease_cash', 'cvp', 'demonstrator', 'loyalty', 'conquest', 'tactical'];
      const dealTypes = Object.keys(rules);

      return (
        <Card className="p-6">
          <h3 className="font-semibold text-onyx mb-4">Stacking Matrix</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-dove">
                  <th className="text-left px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Deal Type</th>
                  {allTypes.map(t => (
                    <th key={t} className="px-3 py-2 text-xs font-semibold text-silver-dust uppercase text-center">{t.replace('_', ' ')}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {dealTypes.map(dt => (
                  <tr key={dt} className="border-b border-dove/50">
                    <td className="px-3 py-2 font-medium capitalize">{dt}</td>
                    {allTypes.map(pt => (
                      <td key={pt} className="px-3 py-2 text-center">
                        {rules[dt]?.includes(pt) ? <span className="text-success font-bold">✓</span> : <span className="text-silver-dust">✗</span>}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      );
    }

    function MileageDegradeSettings() {
      const toast = React.useContext(ToastContext);
      const [table, setTable] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [saving, setSaving] = React.useState(false);

      React.useEffect(() => {
        API.get('/settings/mileage-degradation').then(setTable).finally(() => setLoading(false));
      }, []);

      const handleUpdate = (miles, val) => {
        setTable(t => ({...t, [miles]: parseFloat(val) || 0}));
      };

      const handleAddRow = () => {
        const miles = prompt('Enter annual mileage (e.g., 18000):');
        if (miles && !isNaN(Number(miles))) {
          const points = prompt('Enter residual point adjustment (e.g., -3):');
          if (points !== null) {
            setTable(t => ({...t, [miles]: parseFloat(points) || 0}));
          }
        }
      };

      const handleRemove = (miles) => {
        setTable(t => { const n = {...t}; delete n[miles]; return n; });
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          await API.put('/settings/mileage-degradation', table);
          toast.show('Mileage degradation table saved');
        } catch (e) { toast.show(e.message, 'error'); }
        finally { setSaving(false); }
      };

      if (loading) return <Spinner />;
      if (!table) return null;

      const sorted = Object.entries(table).sort((a, b) => Number(a[0]) - Number(b[0]));

      return (
        <Card className="p-6">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h3 className="font-semibold text-onyx">Lease Mileage Residual Degradation</h3>
              <p className="text-xs text-silver-dust mt-1">Residual percentage point adjustment from the base (10,000 mi/yr). Positive = higher residual, negative = lower.</p>
            </div>
            <div className="flex gap-2">
              <Button size="sm" variant="outline" onClick={handleAddRow}>+ Add Mileage</Button>
              <Button size="sm" onClick={handleSave} disabled={saving}>{saving ? 'Saving...' : 'Save'}</Button>
            </div>
          </div>
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b border-dove">
                <th className="text-left px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Annual Miles</th>
                <th className="text-center px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Residual Adjustment (points)</th>
                <th className="text-center px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Effect</th>
                <th className="w-16"></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(([miles, pts]) => (
                <tr key={miles} className="border-b border-dove/50 hover:bg-dove/20">
                  <td className="px-3 py-2 font-medium">{Number(miles).toLocaleString()} mi/yr</td>
                  <td className="px-3 py-2 text-center">
                    <input type="number" value={pts} onChange={e => handleUpdate(miles, e.target.value)}
                      className="w-20 px-2 py-1 text-center border border-mushroom rounded text-sm" />
                  </td>
                  <td className="px-3 py-2 text-center">
                    {pts > 0 ? <span className="text-success font-medium">+{pts} pts (higher residual)</span>
                      : pts < 0 ? <span className="text-flare-red font-medium">{pts} pts (lower residual)</span>
                      : <span className="text-silver-dust">Base (no adjustment)</span>}
                  </td>
                  <td className="px-3 py-2 text-center">
                    {miles !== '10000' && (
                      <button onClick={() => handleRemove(miles)} className="text-error text-xs hover:underline">Remove</button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="mt-4 p-3 bg-mushroom-light rounded text-xs text-iron-smoke">
            <strong>How it works:</strong> The Santander lease file provides residual values at 10,000 mi/yr. When a dealer selects a different annual mileage in the Payment Estimator, these point adjustments are applied to the base residual. For example, if the base residual is 54% and the customer wants 15,000 mi/yr with a -2 point adjustment, the residual becomes 52%.
          </div>
        </Card>
      );
    }

    // ==================== App Root ====================
    function App() {
      const [user, setUser] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [page, setPage] = React.useState('dashboard');
      const [toasts, setToasts] = React.useState([]);

      const toastCtx = {
        show: (message, type = 'success') => {
          const id = Date.now();
          setToasts(t => [...t, { id, message, type }]);
        },
        dismiss: (id) => setToasts(t => t.filter(x => x.id !== id)),
      };

      React.useEffect(() => {
        if (API.token) {
          API.get('/auth/me').then(u => { setUser(u); }).catch(() => { API.clearToken(); }).finally(() => setLoading(false));
        } else {
          setLoading(false);
        }
      }, []);

      function handleLogin(u) {
        setUser(u);
        setPage(u.role === 'retailer' ? 'lookup' : 'dashboard');
      }

      function handleLogout() {
        API.post('/auth/logout').catch(() => {});
        API.clearToken();
        setUser(null);
      }

      if (loading) return <div className="min-h-screen flex items-center justify-center"><Spinner /></div>;
      if (!user) return (
        <ToastContext.Provider value={toastCtx}>
          <LoginPage onLogin={handleLogin} />
          {toasts.map(t => <Toast key={t.id} {...t} onClose={() => toastCtx.dismiss(t.id)} />)}
        </ToastContext.Provider>
      );

      const pages = { dashboard: DashboardPage, programs: ProgramsPage, codes: CodeMatrixPage, lookup: LookupPage, transactions: TransactionsPage, payfiles: PayFilesPage, settings: SettingsPage };
      const PageComponent = pages[page] || DashboardPage;

      return (
        <AuthContext.Provider value={{ user }}>
        <ToastContext.Provider value={toastCtx}>
          <div className="flex min-h-screen">
            <Sidebar user={user} currentPage={page} onNavigate={setPage} onLogout={handleLogout} />
            <main className="flex-1 p-6 overflow-auto bg-mushroom-light">
              <PageComponent />
            </main>
          </div>
          {toasts.map(t => <Toast key={t.id} {...t} onClose={() => toastCtx.dismiss(t.id)} />)}
        </ToastContext.Provider>
        </AuthContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
