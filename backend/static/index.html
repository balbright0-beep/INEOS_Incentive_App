              <Select label="Model Year" value={filters.model_year} onChange={e => setFilters(f => ({...f, model_year: e.target.value}))}
                options={[{value:'',label:'All'},{value:'MY25',label:'MY25'},{value:'MY26',label:'MY26'}]} />
              <Select label="Body Style" value={filters.body_style} onChange={e => setFilters(f => ({...f, body_style: e.target.value}))}
                options={[{value:'',label:'All'},{value:'station_wagon',label:'Station Wagon'},{value:'quartermaster',label:'Quartermaster'}]} />
              <Select label="Deal Type" value={filters.deal_type} onChange={e => setFilters(f => ({...f, deal_type: e.target.value}))}
                options={[{value:'',label:'All'},{value:'cash',label:'Cash'},{value:'apr',label:'APR'},{value:'lease',label:'Lease'},{value:'cvp',label:'CVP'},{value:'demo',label:'Demo'}]} />
            </div>
          </Card>
          <Card>
            <div className="px-4 py-3 border-b border-dove flex justify-between items-center">
              <span className="text-sm text-silver-dust">{codes.length} codes</span>
            </div>
            <DataTable columns={columns} data={codes} />
          </Card>
        </div>
      );
    }

    // ==================== Incentive Lookup Page ====================
    function PaymentEstimator({ dealType: initDealType, incentive, initMsrp, initTaxRate, leaseTaxBasis, state, modelYear, bodyStyle, trim }) {
      const [open, setOpen] = React.useState(true);
      const [tab, setTab] = React.useState(initDealType || 'cash');
      const [rates, setRates] = React.useState({ apr: [], lease: [], lease_by_trim: {}, mileage_degradation: {} });
      const [mileage, setMileage] = React.useState('10000');
      // Tracks whether the user has manually edited tax_rate so the
      // ZIP-driven initTaxRate effect doesn't clobber their override.
      const taxRateTouchedRef = React.useRef(false);
      const [pf, setPf] = React.useState({
        msrp: initMsrp || '75000', down: '5000', trade: '0',
        discount: '2000', dealer_fee: '0',
        apr: '5.99', term_finance: '60',
        money_factor: '0.00250', residual_pct: '55', term_lease: '36', acq_fee: '895',
        tax_rate: initTaxRate != null ? String(initTaxRate) : '0',
      });
      const v = (k) => parseFloat(pf[k]) || 0;

      // Sync MSRP
      React.useEffect(() => { if (initMsrp) setPf(f => ({...f, msrp: initMsrp})); }, [initMsrp]);

      // Sync tax rate from ZIP unless the user has overridden it.
      React.useEffect(() => {
        if (taxRateTouchedRef.current) return;
        if (initTaxRate != null) setPf(f => ({...f, tax_rate: String(initTaxRate)}));
      }, [initTaxRate]);

      // Fetch Santander rates for this config
      React.useEffect(() => {
        const my = modelYear || 'MY26';
        const bs = bodyStyle || 'station_wagon';
        const trimParam = trim ? `&trim=${encodeURIComponent(trim)}` : '';
        // State pulls in state-specific Santander rate sheets (TX, CA, MI, ...)
        // for any (term, tier) combo where the state file has a row.
        const stateParam = state ? `&state=${encodeURIComponent(state)}` : '';
        API.get(`/lookup/rates?model_year=${my}&body_style=${bs}&tier=1${trimParam}${stateParam}`)
          .then(data => {
            setRates(data);
            // Auto-set first available APR rate
            if (data.apr?.length > 0) {
              const best = data.apr.find(r => r.term === 60) || data.apr[0];
              setPf(f => ({...f, apr: String(best.apr), term_finance: String(best.term)}));
            }
            // Auto-set first available lease rate
            if (data.lease?.length > 0) {
              const best = data.lease.find(r => r.term === 36 && r.money_factor != null)
                || data.lease.find(r => r.money_factor != null)
                || data.lease[0];
              if (best) {
                setPf(f => ({
                  ...f,
                  money_factor: best.money_factor != null ? String(best.money_factor) : f.money_factor,
                  residual_pct: String(best.residual_pct || 55),
                  term_lease: String(best.term),
                  acq_fee: String(best.acq_fee || 895),
                }));
              }
            }
          })
          .catch(() => {});
      }, [modelYear, bodyStyle, trim, state]);

      // Auto-update APR when term changes — pull from loaded rates
      React.useEffect(() => {
        if (tab === 'apr' && rates.apr?.length > 0) {
          const match = rates.apr.find(r => r.term === parseInt(pf.term_finance));
          if (match) setPf(f => ({...f, apr: String(match.apr)}));
        }
      }, [pf.term_finance]);

      // Auto-update lease MF + residual when term or mileage changes — pull from loaded rates
      React.useEffect(() => {
        if (tab === 'lease' && rates.lease?.length > 0) {
          const match = rates.lease.find(r => r.term === parseInt(pf.term_lease));
          if (match) {
            const baseRes = match.residual_pct || 55;
            const degrade = rates.mileage_degradation || {};
            const adj = degrade[mileage] !== undefined ? degrade[mileage] : 0;
            const adjustedRes = Math.max(baseRes + adj, 0);
            const updates = { residual_pct: String(adjustedRes), acq_fee: String(match.acq_fee || 895) };
            if (match.money_factor != null) updates.money_factor = String(match.money_factor);
            setPf(f => ({...f, ...updates}));
          }
        }
      }, [pf.term_lease, mileage, rates.lease]);

      const msrp = v('msrp'), down = v('down'), trade = v('trade'), discount = v('discount'), fee = v('dealer_fee');
      const sellingPrice = msrp - discount;
      // Sales tax basis differs by deal type:
      //   • Cash / APR -> tax on (selling - trade). Trade reduces base
      //     in most states; manufacturer cash incentives DON'T (they
      //     come from the manufacturer post-tax).
      //   • Lease -> tax on the depreciation only (selling - residual)
      //     since the customer is consuming the depreciation portion
      //     of the asset over the lease term, not the residual that
      //     gets returned. State rules vary; user can override the rate.
      // Computed inside each tab branch so the hero / lines pick up
      // the right basis. `tax` is hoisted so the JSX hero block can
      // reference it for the cash net price.
      const taxRate = Math.max(v('tax_rate'), 0) / 100;
      let tax = 0, taxBase = 0;

      // Build APR term options from loaded Santander rates
      const aprTermOpts = rates.apr?.length > 0
        ? rates.apr.map(r => ({ value: String(r.term), label: `${r.term}mo @ ${r.apr}%` }))
        : [{value:'36',label:'36mo'},{value:'48',label:'48mo'},{value:'60',label:'60mo'},{value:'72',label:'72mo'},{value:'84',label:'84mo'}];

      // Build lease term options from loaded rates
      const degrade = rates.mileage_degradation || {};
      const mileageAdj = degrade[mileage] !== undefined ? degrade[mileage] : 0;
      const leaseTermOpts = rates.lease?.length > 0
        ? rates.lease.filter(r => r.residual_pct != null).map(r => {
            const adjRes = Math.max((r.residual_pct || 0) + mileageAdj, 0);
            const mfLabel = r.money_factor != null ? ` MF ${r.money_factor}` : ' Std MF';
            return { value: String(r.term), label: `${r.term}mo | ${adjRes}% res${mfLabel}` };
          })
        : [{value:'24',label:'24mo'},{value:'36',label:'36mo'},{value:'39',label:'39mo'}];

      const mileageOpts = Object.keys(rates.mileage_degradation || {"7500": 1, "10000": 0, "12000": -1, "15000": -2})
        .sort((a,b) => Number(a) - Number(b))
        .map(m => {
          const adj = (rates.mileage_degradation || {})[m] || 0;
          const adjLabel = adj > 0 ? ` (+${adj}pt)` : adj < 0 ? ` (${adj}pt)` : ' (base)';
          return { value: m, label: `${Number(m).toLocaleString()} mi/yr${adjLabel}` };
        });

      let monthly = 0, label = '', lines = [];

      if (tab === 'apr') {
        taxBase = Math.max(sellingPrice - trade, 0);
        tax = taxBase * taxRate;
        const rate = v('apr') / 100 / 12;
        const term = parseInt(pf.term_finance) || 60;
        const financed = Math.max(sellingPrice - incentive - down - trade + fee + tax, 0);
        if (rate > 0 && term > 0 && financed > 0)
          monthly = (financed * rate) / (1 - Math.pow(1 + rate, -term));
        const trimLabel = rates.apr?.[0]?.trim || trim || '';
        label = `${term}mo @ ${pf.apr}% Santander APR${trimLabel ? ' (' + trimLabel + ')' : ''}`;
        lines = [
          ['MSRP', msrp], ['Dealer Discount', -discount], ['Selling Price', sellingPrice],
          ['Incentive Applied', -incentive], ['Down Payment', -down], ['Trade-In', -trade],
          [`Sales Tax (${(v('tax_rate') || 0).toFixed(2)}%)`, tax],
          ['Dealer Fee', fee], ['Amount Financed', financed],
        ];
      } else if (tab === 'lease') {
        const mf = v('money_factor'), resPct = v('residual_pct'), term = parseInt(pf.term_lease) || 36, acq = v('acq_fee');
        const residual = msrp * resPct / 100;
        // State-specific lease tax basis. Default 'depreciation' taxes
        // only (selling - residual). 'full_price' (TX, MD) taxes the
        // full selling price like a purchase, with trade credit.
        const basis = leaseTaxBasis || 'depreciation';
        taxBase = basis === 'full_price'
          ? Math.max(sellingPrice - trade, 0)
          : Math.max(sellingPrice - residual, 0);
        tax = taxBase * taxRate;
        const adjCap = Math.max(sellingPrice - incentive - down - trade + fee + acq + tax, 0);
        monthly = Math.max((adjCap - residual) / term + (adjCap + residual) * mf, 0);
        const trimLabel = rates.lease?.[0]?.trim || trim || '';
        label = `${term}mo Lease | MF ${pf.money_factor} (${(mf * 2400).toFixed(2)}% APR) | ${resPct}% res @ ${Number(mileage).toLocaleString()} mi/yr${trimLabel ? ' | ' + trimLabel : ''}`;
        const basisLabel = basis === 'full_price' ? 'full price' : 'depreciation';
        lines = [
          ['MSRP', msrp], ['Dealer Discount', -discount], ['Selling Price', sellingPrice],
          ['Incentive Applied', -incentive], ['Down / Cap Reduction', -down], ['Trade-In', -trade],
          [`Sales Tax (${(v('tax_rate') || 0).toFixed(2)}% on $${Math.round(taxBase).toLocaleString()} ${basisLabel})`, tax],
          ['Acq Fee + Dealer Fee', acq + fee], ['Adj. Cap Cost', adjCap],
          [`Residual (${resPct}%)`, residual],
        ];
      } else {
        label = 'Cash Purchase';
        taxBase = Math.max(sellingPrice - trade, 0);
        tax = taxBase * taxRate;
        const net = Math.max(sellingPrice - incentive - down - trade + fee + tax, 0);
        lines = [
          ['MSRP', msrp], ['Dealer Discount', -discount], ['Selling Price', sellingPrice],
          ['Incentive Applied', -incentive], ['Down Payment', -down], ['Trade-In', -trade],
          [`Sales Tax (${(v('tax_rate') || 0).toFixed(2)}%)`, tax],
          ['Dealer Fee', fee], ['Net Purchase Price', net],
        ];
      }

      const hasRates = (tab === 'apr' && rates.apr?.length > 0) || (tab === 'lease' && rates.lease?.length > 0);

      return (
        <Card className="mb-4 overflow-hidden">
          <button onClick={() => setOpen(!open)}
            className="w-full flex items-center justify-between px-6 py-3 bg-onyx text-white text-sm font-semibold uppercase tracking-wider hover:bg-charcoal transition-colors">
            <span>Payment Estimator</span>
            <span className="text-lg">{open ? '\u2212' : '+'}</span>
          </button>
          {open && (
            <div className="p-5 fade-in">
              {/* Deal type tabs */}
              <div className="flex rounded-lg bg-dove p-0.5 mb-4">
                {[{id:'cash',label:'Cash'},{id:'apr',label:'Finance (APR)'},{id:'lease',label:'Lease'}].map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={`flex-1 py-2 text-sm font-medium rounded-md transition-colors ${
                      tab === t.id ? 'bg-white text-onyx shadow-sm' : 'text-iron-smoke hover:text-onyx'
                    }`}>{t.label}</button>
                ))}
              </div>

              {/* Santander rate badge */}
              {hasRates && (
                <div className="flex items-center gap-2 mb-4 px-3 py-2 bg-blue-50 border border-blue-200 rounded text-xs text-blue-700">
                  <span className="font-bold">Santander</span> rates auto-loaded for {modelYear || 'MY26'} {(bodyStyle || '').replace('_',' ').replace(/\b\w/g, c => c.toUpperCase())}{trim ? ` ${trim}` : ''}
                  {(tab === 'apr' && rates.has_state_apr) || (tab === 'lease' && rates.has_state_lease)
                    ? <span className="ml-1 px-1.5 py-0.5 rounded bg-blue-700 text-white text-[10px] font-mono uppercase tracking-wider">{rates.state} subvented</span>
                    : rates.state
                      ? <span className="ml-1 text-blue-500">· national rate (no state-specific subvention for {rates.state})</span>
                      : null
                  }
                </div>
              )}

              {/* Payment result hero */}
              {tab !== 'cash' ? (
                <div className="text-center mb-4 py-4 bg-mushroom-light rounded-lg">
                  <p className="text-xs uppercase tracking-wider text-silver-dust mb-1">Estimated Monthly Payment</p>
                  <p className="text-4xl font-bold text-onyx">${Math.round(monthly).toLocaleString()}<span className="text-lg text-silver-dust font-normal">/mo</span></p>
                  <p className="text-xs text-silver-dust mt-1">{label}</p>
                </div>
              ) : (
                <div className="text-center mb-4 py-4 bg-mushroom-light rounded-lg">
                  <p className="text-xs uppercase tracking-wider text-silver-dust mb-1">Net Purchase Price</p>
                  <p className="text-4xl font-bold text-onyx">${Math.round(Math.max(sellingPrice - incentive - down - trade + fee + tax, 0)).toLocaleString()}</p>
                  <p className="text-xs text-silver-dust mt-1">After discount + incentives + tax</p>
                </div>
              )}

              {/* Finance-specific rate selectors — prominent, above the line items */}
              {tab === 'apr' && (
                <div className="grid grid-cols-2 gap-3 mb-4 p-3 bg-mushroom-light/50 rounded border border-dove">
                  <Select label="Term & Rate (Santander Tier 1)" value={pf.term_finance} onChange={e => setPf(f => ({...f, term_finance: e.target.value}))} options={aprTermOpts} />
                  <Input label="APR % (override)" type="number" step="0.01" value={pf.apr} onChange={e => setPf(f => ({...f, apr: e.target.value}))} />
                </div>
              )}
              {tab === 'lease' && (
                <div className="space-y-3 mb-4 p-3 bg-mushroom-light/50 rounded border border-dove">
                  <div className="grid grid-cols-2 gap-3">
                    <Select label="Term & Residual (Santander Tier 1)" value={pf.term_lease} onChange={e => setPf(f => ({...f, term_lease: e.target.value}))} options={leaseTermOpts} />
                    <Select label="Annual Mileage" value={mileage} onChange={e => setMileage(e.target.value)} options={mileageOpts} />
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    <Input label="Money Factor" type="number" step="0.00001" value={pf.money_factor} onChange={e => setPf(f => ({...f, money_factor: e.target.value}))} />
                    <Input label="Residual (%)" type="number" value={pf.residual_pct} onChange={e => setPf(f => ({...f, residual_pct: e.target.value}))} />
                    <Input label="Acq Fee ($)" type="number" value={pf.acq_fee} onChange={e => setPf(f => ({...f, acq_fee: e.target.value}))} />
                  </div>
                </div>
              )}

              {/* Deal line items */}
              <div className="space-y-1 mb-4 text-sm">
                {lines.map(([lbl, val], i) => {
                  const isLast = i === lines.length - 1, isNeg = val < 0;
                  if (val === 0 && !isLast && lbl !== 'Selling Price') return null;
                  return (
                    <div key={i} className={`flex justify-between py-1 ${isLast ? 'border-t-2 border-onyx pt-2 font-bold' : 'border-b border-dove/40'}`}>
                      <span>{lbl}</span>
                      <span className={isNeg ? 'text-success' : ''}>{isNeg ? '-' : ''}${Math.abs(val).toLocaleString(undefined, {maximumFractionDigits: 0})}</span>
                    </div>
                  );
                })}
              </div>

              {/* Deal input fields */}
              <div className="grid grid-cols-2 gap-3 mb-3">
                <Input label="MSRP ($)" type="number" value={pf.msrp} onChange={e => setPf(f => ({...f, msrp: e.target.value}))} />
                <Input label="Dealer Discount ($)" type="number" value={pf.discount} onChange={e => setPf(f => ({...f, discount: e.target.value}))} placeholder="0" />
                <Input label="Down Payment ($)" type="number" value={pf.down} onChange={e => setPf(f => ({...f, down: e.target.value}))} />
                <Input label="Trade-In Value ($)" type="number" value={pf.trade} onChange={e => setPf(f => ({...f, trade: e.target.value}))} />
                <Input label="Dealer Fee ($)" type="number" value={pf.dealer_fee} onChange={e => setPf(f => ({...f, dealer_fee: e.target.value}))} placeholder="0" />
                <Input
                  label={`Sales Tax Rate (%)${initTaxRate > 0 && !taxRateTouchedRef.current ? ' — from ZIP' : ''}`}
                  type="number" step="0.01" value={pf.tax_rate}
                  onChange={e => { taxRateTouchedRef.current = true; setPf(f => ({...f, tax_rate: e.target.value})); }}
                  placeholder="0.00"
                />
              </div>

              {/* Lease comparison by trim (if available) */}
              {tab === 'lease' && rates.lease_by_trim && Object.keys(rates.lease_by_trim).length > 1 && (
                <details className="mb-3">
                  <summary className="text-xs font-semibold text-iron-smoke cursor-pointer hover:text-onyx uppercase tracking-wider">Rate Comparison by Trim</summary>
                  <div className="mt-2 overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="border-b border-dove">
                          <th className="text-left py-1 pr-2 text-silver-dust uppercase">Trim</th>
                          <th className="text-left py-1 px-2 text-silver-dust uppercase">Term</th>
                          <th className="text-right py-1 px-2 text-silver-dust uppercase">MF</th>
                          <th className="text-right py-1 px-2 text-silver-dust uppercase">Res %</th>
                          <th className="text-right py-1 pl-2 text-silver-dust uppercase">APR Equiv</th>
                        </tr>
                      </thead>
                      <tbody>
                        {Object.entries(rates.lease_by_trim).map(([trimName, termRates]) =>
                          termRates.filter(r => r.money_factor != null).map((r, j) => (
                            <tr key={`${trimName}-${j}`} className="border-b border-dove/30 hover:bg-dove/20">
                              <td className="py-1 pr-2 font-medium">{j === 0 ? trimName : ''}</td>
                              <td className="py-1 px-2">{r.term}mo</td>
                              <td className="py-1 px-2 text-right font-mono">{r.money_factor?.toFixed(5) || 'Std'}</td>
                              <td className="py-1 px-2 text-right">{Math.max((r.residual_pct || 0) + mileageAdj, 0)}%</td>
                              <td className="py-1 pl-2 text-right">{r.money_factor ? (r.money_factor * 2400).toFixed(2) + '%' : 'Std'}</td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </details>
              )}

              <p className="text-xs text-silver-dust italic text-center mt-3">
                Estimate only. Does not include tax, title, or registration.
                {tab === 'apr' && ' APR and terms subject to Santander credit approval. Rate shown is Tier 1.'}
                {tab === 'lease' && ` Lease subject to Santander approval. Residual adjusted for ${Number(mileage).toLocaleString()} mi/yr. First payment, taxes, and disposition fee may apply.`}
              </p>
            </div>
          )}
        </Card>
      );
    }

    function LookupPage() {
      const toast = React.useContext(ToastContext);
      const [step, setStep] = React.useState(1);
      const [vehicle, setVehicle] = React.useState({
        vin: '', model_year: 'MY26', body_style: 'station_wagon', trim: '', zip_code: '', state: '',
      });
      const [vinData, setVinData] = React.useState(null);
      const [vinLoading, setVinLoading] = React.useState(false);
      // Catalog MSRP for the current (model_year, body_style, trim) combo —
      // used as the calculator's MSRP when no specific VIN matched. The
      // VIN's actual MSRP wins when a real unit is in inventory.
      const [catalogMsrp, setCatalogMsrp] = React.useState(null);
      const [stateName, setStateName] = React.useState('');
      // Tax rate auto-populated from the ZIP lookup. Default 0 means
      // PaymentEstimator pre-fill stays neutral until ZIP resolves.
      // PaymentEstimator can still be edited manually. taxRateSource is
      // 'zip' when the bundled ZIP-precise dataset had a hit, 'state'
      // when we fell back to the state baseline — used to label the UI.
      const [taxRate, setTaxRate] = React.useState(0);
      const [taxRateSource, setTaxRateSource] = React.useState('state');
      // Lease tax basis from the resolved state. 'depreciation' (default,
      // most states) or 'full_price' (TX, MD). Drives the lease tax base
      // in PaymentEstimator.
      const [leaseTaxBasis, setLeaseTaxBasis] = React.useState('depreciation');
      const [preview, setPreview] = React.useState(null);
      const [previewLoading, setPreviewLoading] = React.useState(false);
      const [dealType, setDealType] = React.useState(null);
      const [lookup, setLookup] = React.useState(null);
      const [lookupLoading, setLookupLoading] = React.useState(false);
      const [selectedIds, setSelectedIds] = React.useState(new Set());

      const updateVehicle = (key, val) => setVehicle(v => ({ ...v, [key]: val }));
      const vinActiveRef = React.useRef(false);

      // VIN auto-lookup
      React.useEffect(() => {
        const vin = vehicle.vin.trim().toUpperCase();
        if (vin.length < 17) {
          if (vinActiveRef.current) { vinActiveRef.current = false; setVinData(null); }
          return;
        }
        setVinLoading(true);
        API.get(`/lookup/vin/${vin}`)
          .then(data => {
            vinActiveRef.current = true;
            setVinData(data);
            setVehicle(v => ({
              ...v,
              model_year: data.model_year || v.model_year,
              body_style: data.body_style || v.body_style,
              trim: data.trim || v.trim,
            }));
            toast.show(`Vehicle found: ${data.model_year || ''} ${(data.body_style || '').replace('_',' ')} ${data.trim || ''}${data.color_exterior ? ' — ' + data.color_exterior : ''}`);
          })
          .catch(() => {
            vinActiveRef.current = false;
            setVinData(null);
            toast.show('VIN not found in inventory. Select details manually.', 'warning');
          })
          .finally(() => setVinLoading(false));
      }, [vehicle.vin]);

      // Catalog MSRP fallback — fires when the user picks model/body/trim
      // manually. VIN-derived MSRP takes precedence in the calculator;
      // this is what we use when no real unit was matched.
      React.useEffect(() => {
        if (vinActiveRef.current) return;
        const params = `model_year=${encodeURIComponent(vehicle.model_year)}&body_style=${encodeURIComponent(vehicle.body_style)}${vehicle.trim ? '&trim=' + encodeURIComponent(vehicle.trim) : ''}`;
        API.get(`/lookup/msrp?${params}`).then(data => {
          if (!vinActiveRef.current) setCatalogMsrp(data?.msrp ? Math.round(Number(data.msrp)) : null);
        }).catch(() => {});
      }, [vehicle.model_year, vehicle.body_style, vehicle.trim]);

      function resetWizard() {
        setStep(1);
        setVehicle({ vin: '', model_year: 'MY26', body_style: 'station_wagon', trim: '', zip_code: '', state: '' });
        setVinData(null);
        setCatalogMsrp(null);
        setStateName('');
        setTaxRate(0);
        setTaxRateSource('state');
        setLeaseTaxBasis('depreciation');
        setPreview(null);
        setDealType(null);
        setLookup(null);
        setSelectedIds(new Set());
        vinActiveRef.current = false;
      }

      async function handleStep1Continue(e) {
        e.preventDefault();
        if (!vehicle.zip_code || vehicle.zip_code.replace(/\D/g, '').length < 5) {
          toast.show('Enter a 5-digit ZIP so state-specific programs filter correctly.', 'warning');
          return;
        }
        setPreviewLoading(true);
        try {
          const body = {
            vin: vehicle.vin || null,
            model_year: vehicle.model_year,
            body_style: vehicle.body_style,
            trim: vehicle.trim || null,
            // Special edition (Arcane Works Detour, Iceland Tactical)
            // is sourced from the VIN-decode response. Without
            // forwarding it the backend evaluates the vehicle as a
            // regular SW/QM and consults the wrong rate sheet — an
            // Arcane Works VIN ends up showing lease available even
            // though Arcane has no lease rates.
            // Iceland Tactical comes through here. Arcane Works is a
            // body_style now, not a special edition.
            special_edition: (vinActiveRef.current && vinData) ? (vinData.special_edition || null) : null,
            zip_code: vehicle.zip_code,
            state: vehicle.state || null,
          };
          const r = await API.post('/lookup/preview', body);
          setPreview(r);
          setStep(2);
        } catch (e) {
          toast.show(e.message || 'Could not load deal types', 'error');
        } finally {
          setPreviewLoading(false);
        }
      }

      async function selectDealTypeAndLoad(dt) {
        setDealType(dt);
        setStep(3);
        setLookupLoading(true);
        setLookup(null);
        try {
          const body = {
            vin: vehicle.vin || null,
            model_year: vehicle.model_year,
            body_style: vehicle.body_style,
            trim: vehicle.trim || null,
            // Iceland Tactical comes through here. Arcane Works is a
            // body_style now, not a special edition.
            special_edition: (vinActiveRef.current && vinData) ? (vinData.special_edition || null) : null,
            finance_type: dt,
            zip_code: vehicle.zip_code || null,
            state: vehicle.state || null,
            conquest: false,
            loyalty: false,
          };
          const r = await API.post('/lookup', body);
          setLookup(r);
          setSelectedIds(new Set((r.eligible_programs || []).filter(p => p.auto_selected).map(p => p.program_id)));
        } catch (e) {
          toast.show(e.message || 'Lookup failed', 'error');
        } finally {
          setLookupLoading(false);
        }
      }

      function toggleProgram(id) {
        setSelectedIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      }

      // Detect when the selection implies a different (loyalty/conquest)
      // variant of the campaign code and re-fetch /api/lookup so the
      // code chip + layers + total swap to that variant. The code is
      // keyed by these flags — a "Loyalty Cash" toggle means we want
      // USCSWSL, not USCSWS. We preserve the user's selection across
      // the variant swap by program_id, and pull in any auto-selected
      // programs from the new variant that didn't exist in the old one.
      const refetchInFlightRef = React.useRef(false);
      React.useEffect(() => {
        if (!lookup || refetchInFlightRef.current) return;
        let needLoyalty = false, needConquest = false;
        for (const p of (lookup.eligible_programs || [])) {
          if (!selectedIds.has(p.program_id)) continue;
          if (p.program_type === 'loyalty') needLoyalty = true;
          else if (p.program_type === 'conquest') needConquest = true;
        }
        if (!!lookup.loyalty === needLoyalty && !!lookup.conquest === needConquest) return;
        refetchInFlightRef.current = true;
        const body = {
          vin: vehicle.vin || null,
          model_year: vehicle.model_year,
          body_style: vehicle.body_style,
          trim: vehicle.trim || null,
          finance_type: dealType,
          zip_code: vehicle.zip_code || null,
          state: vehicle.state || null,
          conquest: needConquest,
          loyalty: needLoyalty,
        };
        API.post('/lookup', body)
          .then(next => {
            const oldIds = new Set((lookup.eligible_programs || []).map(p => p.program_id));
            const nextIds = new Set((next.eligible_programs || []).map(p => p.program_id));
            const merged = new Set();
            selectedIds.forEach(id => { if (nextIds.has(id)) merged.add(id); });
            for (const p of (next.eligible_programs || [])) {
              if (p.auto_selected && !oldIds.has(p.program_id)) merged.add(p.program_id);
            }
            setLookup(next);
            setSelectedIds(merged);
          })
          .catch(() => {})
          .finally(() => { refetchInFlightRef.current = false; });
      }, [selectedIds, lookup, dealType, vehicle]);

      // Selection-derived totals + conflicts
      const selection = React.useMemo(() => {
        if (!lookup) return null;
        const eligible = lookup.eligible_programs || [];
        let total = 0;
        const conflicts = [];
        for (const p of eligible) {
          if (!selectedIds.has(p.program_id)) continue;
          total += p.amount;
          for (const otherId of (p.conflicts_with || [])) {
            if (selectedIds.has(otherId)) {
              const other = eligible.find(x => x.program_id === otherId);
              if (other) conflicts.push(`${p.program_name} cannot be combined with ${other.program_name}`);
            }
          }
        }
        return {
          eligible,
          total,
          conflictSet: Array.from(new Set(conflicts)),
          noEligible: eligible.length === 0,
          totalChanged: Math.abs(total - lookup.total_support_amount) > 0.01,
        };
      }, [lookup, selectedIds]);

      const stepDef = [
        { n: 1, label: 'Vehicle' },
        { n: 2, label: 'Deal Type' },
        { n: 3, label: 'Programs' },
        { n: 4, label: 'Result' },
      ];

      return (
        <div className="fade-in max-w-5xl mx-auto">
          <h1 className="text-2xl font-bold text-onyx mb-2">Incentive Lookup</h1>
          <p className="text-sm text-iron-smoke mb-6">Step through your vehicle, deal type, and program selection. We'll show the campaign code and an estimated payment at the end.</p>

          {/* Stepper */}
          <div className="flex bg-white border border-dove rounded-lg overflow-hidden mb-6">
            {stepDef.map((s, i) => {
              const done = step > s.n, active = step === s.n;
              const numBg = active ? 'bg-flare-red text-white' : done ? 'bg-success text-white' : 'bg-dove text-iron-smoke';
              const textColor = active ? 'text-onyx' : done ? 'text-success' : 'text-silver-dust';
              const clickable = done || s.n < step;
              return (
                <div key={s.n} onClick={() => clickable && setStep(s.n)}
                  className={`flex-1 flex items-center gap-2 px-4 py-3 text-xs uppercase tracking-wider font-mono ${textColor} ${clickable ? 'cursor-pointer hover:bg-mushroom-light' : ''} ${i < stepDef.length - 1 ? 'border-r border-dove' : ''}`}>
                  <span className={`inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold ${numBg}`}>{s.n}</span>
                  <span>{s.label}</span>
                </div>
              );
            })}
          </div>

          {/* Step 1: Vehicle + ZIP */}
          {step === 1 && (
            <Card className="p-6 max-w-xl mx-auto fade-in">
              <form onSubmit={handleStep1Continue}>
                <h3 className="font-semibold text-onyx mb-4 uppercase text-xs tracking-wider">Vehicle Information</h3>
                <Input label="VIN Lookup" value={vehicle.vin} onChange={e => updateVehicle('vin', e.target.value.toUpperCase())}
                  placeholder="Enter VIN to auto-populate vehicle details" className="font-mono" />
                {vinLoading && <p className="text-xs text-silver-dust mt-1 mb-2">Searching inventory...</p>}
                {vinData && (
                  <div className="p-3 bg-success/5 border border-success/20 rounded-md my-2 text-xs fade-in">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="font-semibold text-success">Vehicle Found</span>
                      <Badge variant={vinData.source === 'inventory' ? 'active' : 'draft'}>
                        {vinData.source === 'inventory' ? 'Inventory' : 'VIN Pattern'}
                      </Badge>
                    </div>
                    <div className="grid grid-cols-2 gap-x-4 gap-y-0.5 text-iron-smoke">
                      <span>{vinData.model_year} {(vinData.body_style || '').replace('_',' ').replace(/\b\w/g, c => c.toUpperCase())}</span>
                      <span>{vinData.trim || ''}</span>
                      {vinData.color_exterior && <span>Ext: {vinData.color_exterior}</span>}
                      {vinData.msrp && <span>MSRP: ${Number(vinData.msrp).toLocaleString()}</span>}
                    </div>
                  </div>
                )}

                <div className="flex items-center gap-3 my-4">
                  <div className="flex-1 h-px bg-mushroom"></div>
                  <span className="text-xs font-semibold text-silver-dust uppercase tracking-widest">or select manually</span>
                  <div className="flex-1 h-px bg-mushroom"></div>
                </div>

                <div className="grid grid-cols-2 gap-3 mb-3">
                  <Select label="Model Year" value={vehicle.model_year} onChange={e => updateVehicle('model_year', e.target.value)}
                    options={[{value:'MY25',label:'MY25'},{value:'MY26',label:'MY26'},{value:'MY27',label:'MY27'}]} />
                  <Select label="Body Style" value={vehicle.body_style} onChange={e => updateVehicle('body_style', e.target.value)}
                    options={[{value:'station_wagon',label:'Station Wagon'},{value:'quartermaster',label:'Quartermaster'},{value:'arcane_works',label:'Arcane Works'}]} />
                </div>
                <Select label="Trim" value={vehicle.trim} onChange={e => updateVehicle('trim', e.target.value)} className="mb-4"
                  options={[{value:'',label:'Any'},{value:'Base',label:'Base'},{value:'Fieldmaster',label:'Fieldmaster'},
                    {value:'Belstaff',label:'Belstaff'},{value:'Trialmaster',label:'Trialmaster'},{value:'Highlands',label:'Highlands'}]} />

                <h3 className="font-semibold text-onyx mb-3 mt-5 uppercase text-xs tracking-wider">Customer Location</h3>
                <Input label="ZIP Code" value={vehicle.zip_code} onChange={e => {
                  const v = e.target.value.replace(/\D/g, '').slice(0, 5);
                  updateVehicle('zip_code', v);
                  if (v.length >= 5) {
                    API.get(`/lookup/zip/${v}`).then(r => {
                      updateVehicle('state', r.state);
                      setStateName(r.state_name || '');
                      if (typeof r.tax_rate === 'number') setTaxRate(r.tax_rate);
                      if (r.tax_rate_source) setTaxRateSource(r.tax_rate_source);
                      if (r.lease_tax_basis) setLeaseTaxBasis(r.lease_tax_basis);
                    }).catch(() => {});
                  }
                }} placeholder="e.g., 92101" className="w-32" />
                {vehicle.state && <p className="text-xs text-success mt-1">Resolved: {vehicle.state}{stateName ? ` (${stateName})` : ''}{taxRate > 0 ? ` · ${taxRate}% sales tax (${taxRateSource === 'zip' ? 'ZIP' : 'state estimate'})` : ''}</p>}

                <Button type="submit" disabled={previewLoading} className="w-full mt-6">
                  {previewLoading ? 'Loading…' : 'Continue →'}
                </Button>
              </form>
            </Card>
          )}

          {/* Step 2: Deal Type */}
          {step === 2 && (
            <div className="fade-in">
              <div className="text-center mb-5">
                <h2 className="text-xl font-bold text-onyx">Choose How You'd Like to Pay</h2>
                <p className="text-sm text-iron-smoke mt-1">Each option shows the total support available for this vehicle and ZIP.</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {[
                  { id: 'cash', name: 'Cash', sub: 'Pay in full' },
                  { id: 'apr', name: 'APR', sub: 'Finance with Santander' },
                  { id: 'lease', name: 'Lease', sub: 'Lease with Santander' },
                ].map(c => {
                  const p = preview?.[c.id] || { available: false, total: 0, program_count: 0 };
                  // unavailable_reason from /preview surfaces things like
                  // "No Santander lease rates for this vehicle" — used so
                  // the disabled card explains why instead of all three
                  // saying the same generic line.
                  const reasonText = p.available
                    ? null
                    : (p.unavailable_reason || 'No active programs for this configuration');
                  return (
                    <button key={c.id} type="button" disabled={!p.available} onClick={() => selectDealTypeAndLoad(c.id)}
                      title={reasonText || ''}
                      className={`text-left p-6 rounded-lg border-2 transition-all ${p.available ? 'bg-white border-dove hover:border-flare-red hover:shadow-lg cursor-pointer' : 'bg-mushroom-light border-dove opacity-50 cursor-not-allowed'}`}>
                      <div className="text-xs uppercase tracking-wider text-iron-smoke font-mono">{c.sub}</div>
                      <div className="text-2xl font-bold text-onyx mt-1">{c.name}</div>
                      {/* Total dollar amount intentionally hidden — user picks deal type
                          before seeing the per-program breakdown so the headline number
                          doesn't bias toward the highest-stack option. */}
                      {p.available ? (
                        <div className="text-sm font-semibold text-onyx mt-3">{p.program_count} program{p.program_count === 1 ? '' : 's'} available</div>
                      ) : (
                        <div className="text-xs text-silver-dust mt-3">{reasonText}</div>
                      )}
                    </button>
                  );
                })}
              </div>
              <div className="flex justify-center mt-6">
                <Button onClick={() => setStep(1)} className="bg-white text-onyx border border-dove hover:bg-mushroom-light">← Back</Button>
              </div>
            </div>
          )}

          {/* Step 3: Programs */}
          {step === 3 && (
            <div className="fade-in max-w-3xl mx-auto">
              <div className="text-center mb-5">
                <h2 className="text-xl font-bold text-onyx">Choose Your Programs</h2>
                <p className="text-sm text-iron-smoke mt-1">Default selection auto-stacks everything compatible. Toggle any program to include or skip it.</p>
              </div>
              {lookupLoading ? (
                <Card className="p-12 text-center text-silver-dust">Loading programs…</Card>
              ) : !lookup ? (
                <Card className="p-12 text-center">
                  <h3 className="text-base text-error mb-1">No Active Program</h3>
                  <p className="text-sm text-iron-smoke">No active incentive program for this configuration.</p>
                </Card>
              ) : (
                <>
                  <Card className="p-5 mb-4 flex justify-between items-center flex-wrap gap-3">
                    <div>
                      <div className="text-xs font-mono uppercase tracking-wider text-silver-dust mb-1">Running Total</div>
                      <div className="text-xs text-iron-smoke">{lookup.model_year} · {(lookup.body_style || '').replace('_',' ').toUpperCase()} · {(lookup.deal_type || '').toUpperCase()}</div>
                    </div>
                    <div className={`text-3xl font-bold font-mono ${selection?.total === 0 ? 'text-silver-dust' : 'text-success'}`}>${Number(selection?.total || 0).toLocaleString()}</div>
                  </Card>
                  {selection?.conflictSet?.length > 0 && (
                    <div className="mb-3 p-3 bg-error/5 border-l-4 border-error rounded text-xs text-error">
                      <b>Selection conflict:</b> {selection.conflictSet.join(' · ')}
                    </div>
                  )}
                  {selection?.noEligible ? (
                    <Card className="p-12 text-center">
                      <h3 className="text-base text-iron-smoke mb-1">No additional programs</h3>
                      <p className="text-sm text-silver-dust">Continue to see the base campaign code for this deal type.</p>
                    </Card>
                  ) : (
                    <Card className="p-5">
                      <div className="flex justify-between items-end mb-3 flex-wrap gap-2">
                        <div>
                          <h3 className="text-xs uppercase tracking-wider font-mono text-onyx">Available Programs</h3>
                          <p className="text-xs text-iron-smoke mt-1">Toggle any program to include or skip it.</p>
                        </div>
                        <div className="flex gap-2">
                          <button type="button" onClick={() => setSelectedIds(new Set((lookup.eligible_programs || []).filter(p => p.auto_selected).map(p => p.program_id)))}
                            className="text-xs font-mono px-3 py-1.5 border border-dove rounded hover:bg-mushroom-light">Reset to Default</button>
                          <button type="button" onClick={() => setSelectedIds(new Set())}
                            className="text-xs font-mono px-3 py-1.5 border border-dove rounded text-error hover:bg-error/5">Clear All</button>
                        </div>
                      </div>
                      <div className="space-y-2">
                        {(lookup.eligible_programs || []).map(p => {
                          const sel = selectedIds.has(p.program_id);
                          return (
                            <label key={p.program_id}
                              className={`flex items-start gap-3 p-3 rounded border cursor-pointer transition-colors ${sel ? 'border-flare-red bg-flare-red/5' : 'border-dove bg-white'}`}>
                              <input type="checkbox" checked={sel} onChange={() => toggleProgram(p.program_id)}
                                className="mt-1 w-4 h-4 accent-flare-red cursor-pointer" />
                              <div className="flex-1 min-w-0">
                                <div className="flex justify-between items-center gap-3 flex-wrap">
                                  <div className="font-semibold text-onyx text-sm">{p.program_name}</div>
                                  <div className={`font-mono font-bold text-sm ${sel ? 'text-success' : 'text-silver-dust'}`}>${Number(p.amount).toLocaleString()}</div>
                                </div>
                                <div className="text-[11px] font-mono uppercase tracking-wide text-iron-smoke mt-0.5">{(p.program_type || '').replace('_', ' ')}</div>
                                {(p.conflicts_with || []).length > 0 && (
                                  <div className="text-[11px] text-silver-dust mt-1">
                                    Mutually exclusive with {(p.conflicts_with || []).map(id => {
                                      const o = (lookup.eligible_programs || []).find(x => x.program_id === id);
                                      return o ? o.program_name : id.slice(0, 8);
                                    }).join(', ')}
                                  </div>
                                )}
                              </div>
                            </label>
                          );
                        })}
                      </div>
                    </Card>
                  )}
                </>
              )}
              <div className="flex justify-between mt-6 gap-2">
                <Button onClick={() => setStep(2)} className="bg-white text-onyx border border-dove hover:bg-mushroom-light">← Back</Button>
                {/* Block step 3 -> 4 when the selection contains mutually-exclusive
                    programs so the user can't generate a campaign code from an
                    invalid stack. The conflict banner above the chooser tells them
                    what to fix; the disabled button is the enforcement. */}
                <Button
                  onClick={() => setStep(4)}
                  disabled={!lookup || (selection?.conflictSet?.length || 0) > 0}
                  title={(selection?.conflictSet?.length || 0) > 0 ? 'Resolve the selection conflict before continuing.' : ''}
                >Continue to Result →</Button>
              </div>
            </div>
          )}

          {/* Step 4: Result + Calculator */}
          {step === 4 && lookup && (
            <div className="fade-in">
              <Card className="p-8 border-2 border-flare-red/20 mb-4 text-center">
                {/* Always show the campaign code chip — even when total=0. When
                    nothing's selected we swap to the dedicated base code (USCSSZ
                    etc.) so SAP records the no-incentive deal under the right
                    code instead of the bundled-stack one. lookup.base_code is
                    populated by lookup_incentive; falls back to lookup.code
                    on older API responses. */}
                <p className="text-xs uppercase tracking-wider text-silver-dust mb-2 font-mono">Campaign Code to Enter in SAP</p>
                <div className="inline-block bg-onyx text-white px-8 py-4 rounded-lg mb-3">
                  <span className="text-5xl font-bold tracking-widest font-mono">{(selection?.total === 0 && lookup.base_code) ? lookup.base_code : lookup.code}</span>
                </div>
                <p className={`text-3xl font-bold ${selection?.total === 0 ? 'text-silver-dust' : 'text-success'}`}>${Number(selection?.total || 0).toLocaleString()}</p>
                <p className="text-xs text-silver-dust mt-1">
                  {selection?.total === 0
                    ? (selection?.noEligible
                        ? 'Base code for this deal type — no incentive programs apply'
                        : 'Base code for this deal type — customer not taking any available programs')
                    : selection?.totalChanged
                      ? `Adjusted from default $${Number(lookup.total_support_amount).toLocaleString()} based on selection`
                      : 'Total Support Amount'}
                  {lookup.label ? ' · ' + lookup.label : ''}
                </p>
                <div className="text-[11px] text-iron-smoke font-mono uppercase tracking-wider mt-3">
                  {lookup.model_year} · {(lookup.body_style || '').replace('_',' ').toUpperCase()} · {(lookup.deal_type || '').toUpperCase()}
                </div>
              </Card>

              {/* Vehicle specs — only when a real VIN matched, so the user can confirm the calc is using their actual unit's MSRP from the Master File hub. */}
              {vinData && (
                <Card className="p-5 mb-4">
                  <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <h3 className="text-xs uppercase tracking-wider font-mono text-onyx">Your Vehicle</h3>
                    <Badge variant={vinData.source === 'inventory' ? 'active' : 'draft'}>
                      {vinData.source === 'inventory' ? 'From Inventory' : 'VIN Pattern'}
                    </Badge>
                  </div>
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                    <div>
                      <div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">VIN</div>
                      <div className="text-xs font-mono text-onyx mt-0.5">{vinData.vin}</div>
                    </div>
                    {vinData.msrp != null && (
                      <div><div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">MSRP</div><div className="text-sm text-onyx mt-0.5">${Number(vinData.msrp).toLocaleString()}</div></div>
                    )}
                    {vinData.trim && (
                      <div><div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">Trim</div><div className="text-sm text-onyx mt-0.5">{vinData.trim}</div></div>
                    )}
                    {vinData.color_exterior && (
                      <div><div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">Exterior</div><div className="text-sm text-onyx mt-0.5">{vinData.color_exterior}</div></div>
                    )}
                    {vinData.color_interior && (
                      <div><div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">Interior</div><div className="text-sm text-onyx mt-0.5">{vinData.color_interior}</div></div>
                    )}
                    {vinData.dealer_name && (
                      <div><div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">Dealer</div><div className="text-sm text-onyx mt-0.5">{vinData.dealer_name}</div></div>
                    )}
                    {vinData.status && (
                      <div><div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">Status</div><div className="text-sm text-onyx mt-0.5">{vinData.status}</div></div>
                    )}
                    {vinData.material && (
                      <div><div className="text-[10px] uppercase tracking-wider font-mono text-silver-dust">Material</div><div className="text-sm text-onyx mt-0.5">{vinData.material}</div></div>
                    )}
                  </div>
                </Card>
              )}

              {selection?.eligible?.filter(p => selectedIds.has(p.program_id)).length > 0 && (
                <Card className="p-5 mb-4">
                  <h3 className="text-xs uppercase tracking-wider font-mono text-onyx mb-3">Selected Programs</h3>
                  <div className="space-y-1">
                    {selection.eligible.filter(p => selectedIds.has(p.program_id)).map((p, i) => (
                      <div key={i} className="flex justify-between py-2 border-b border-dove/40 text-sm">
                        <span>{p.program_name} <span className="ml-2 px-2 py-0.5 bg-mushroom rounded-full text-[10px] font-mono uppercase">{(p.program_type || '').replace('_', ' ')}</span></span>
                        <span className="font-mono font-semibold text-success">${Number(p.amount).toLocaleString()}</span>
                      </div>
                    ))}
                    <div className="flex justify-between py-2 border-t-2 border-onyx font-bold">
                      <span>Total Support</span>
                      <span className="font-mono">${Number(selection?.total || 0).toLocaleString()}</span>
                    </div>
                  </div>
                </Card>
              )}

              <PaymentEstimator
                dealType={dealType}
                incentive={selection?.total || 0}
                initMsrp={vinData?.msrp ? String(Math.round(vinData.msrp)) : (catalogMsrp ? String(catalogMsrp) : '75000')}
                initTaxRate={taxRate}
                leaseTaxBasis={leaseTaxBasis}
                state={vehicle.state}
                modelYear={vehicle.model_year}
                bodyStyle={vehicle.body_style}

    function SantanderRatesSettings() {
      const toast = React.useContext(ToastContext);
      const [slots, setSlots] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [busyKind, setBusyKind] = React.useState(null);

      const load = () => API.get('/settings/santander-rates').then(setSlots).finally(() => setLoading(false));
      React.useEffect(() => { load(); }, []);

      async function handleUpload(kind, file) {
        if (!file) return;
        setBusyKind(kind);
        try {
          const r = await API.upload(`/settings/santander-rates/${kind}`, file);
          toast.show(`Uploaded ${r.filename} (${(r.size_bytes / 1024).toFixed(0)} KB) — calculator will use the new rates immediately`);
          load();
        } catch (e) {
          toast.show(e.message || 'Upload failed', 'error');
        } finally {
          setBusyKind(null);
        }
      }

      async function handleClear(kind, label) {
        if (!confirm(`Clear the current ${label} upload? The calculator will fall back to the repo-bundled file (if any).`)) return;
        setBusyKind(kind);
        try {
          await API.del(`/settings/santander-rates/${kind}`);
          toast.show(`${label} upload cleared`);
          load();
        } catch (e) { toast.show(e.message || 'Failed', 'error'); }
        finally { setBusyKind(null); }
      }

      const fmtAge = (iso) => {
        if (!iso) return '';
        // Server timestamps come back without a 'Z' suffix but are stored
        // as UTC-naive — append Z so the browser doesn't interpret them
        // as local time and produce negative ages.
        const d = new Date(/[zZ]|[+-]\d\d:?\d\d$/.test(iso) ? iso : iso + 'Z');
        const days = Math.floor((Date.now() - d.getTime()) / 86400000);
        if (days <= 0) return 'today';
        if (days === 1) return 'yesterday';
        if (days < 30) return `${days} days ago`;
        return d.toLocaleDateString();
      };

      if (loading) return <Spinner />;

      return (
        <div className="space-y-4 max-w-4xl">
          <Card className="p-4 bg-mushroom-light">
            <p className="text-sm text-iron-smoke">
              Upload the four monthly Santander input files. The payment estimator picks up the new rates
              immediately on each lookup — no redeploy needed. Uploading replaces the previous file in
              that slot. Clear a slot to fall back to the repo-bundled copy.
            </p>
          </Card>
          {slots.map(slot => {
            const isBusy = busyKind === slot.kind;
            const hasUpload = !!slot.filename;
            return (
              <Card key={slot.kind} className="p-5">
                <div className="flex items-start justify-between gap-4 flex-wrap">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                      <h3 className="font-semibold text-onyx">{slot.label}</h3>
                      {hasUpload
                        ? <Badge variant="active">Uploaded</Badge>
                        : <Badge variant="draft">No upload — using repo file</Badge>}
                    </div>
                    {hasUpload ? (
                      <div className="text-xs text-iron-smoke mt-1">
                        <div className="font-mono">{slot.filename}</div>
                        <div>{(slot.size_bytes / 1024).toFixed(0)} KB · uploaded {fmtAge(slot.uploaded_at)}{slot.uploaded_by ? ` by ${slot.uploaded_by}` : ''}</div>
                      </div>
                    ) : (
                      <p className="text-xs text-silver-dust mt-1">Drop in the latest monthly file here.</p>
                    )}
                  </div>
                  <div className="flex gap-2 items-center">
                    <label className="cursor-pointer">
                      <input type="file" accept=".xlsx" className="hidden" disabled={isBusy}
                        onChange={e => { handleUpload(slot.kind, e.target.files[0]); e.target.value = ''; }} />
                      <span className={`inline-block px-4 py-2 rounded-lg text-sm font-semibold ${isBusy ? 'bg-mushroom text-silver-dust' : 'bg-onyx text-white hover:bg-charcoal cursor-pointer'}`}>
                        {isBusy ? 'Uploading...' : (hasUpload ? 'Replace File' : 'Upload File')}
                      </span>
                    </label>
                    {hasUpload && (
                      <button type="button" disabled={isBusy} onClick={() => handleClear(slot.kind, slot.label)}
                        className="px-3 py-2 rounded-lg text-sm border border-dove text-error hover:bg-error/5 disabled:opacity-50">
                        Clear
                      </button>
                    )}
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      );
    }

        <div>
          <div className="flex justify-end mb-4">
            <Button size="sm" onClick={() => setShowCreate(true)}>+ Add User</Button>
          </div>
          <Card><DataTable columns={columns} data={users} /></Card>
          <Modal open={showCreate} onClose={() => setShowCreate(false)} title="Create User">
            <form onSubmit={handleCreate} className="space-y-3">
              <Input label="Username" value={form.username} onChange={e => setForm(f => ({...f, username: e.target.value}))} required />
              <Input label="Password" type="password" value={form.password} onChange={e => setForm(f => ({...f, password: e.target.value}))} required />
              <Input label="Name" value={form.name} onChange={e => setForm(f => ({...f, name: e.target.value}))} required />
              <Select label="Role" value={form.role} onChange={e => setForm(f => ({...f, role: e.target.value}))}
                options={[{value:'admin',label:'Admin'},{value:'rbm',label:'RBM'},{value:'retailer',label:'Retailer'}]} />
              <div className="flex justify-end gap-2 pt-2">
                <Button variant="outline" onClick={() => setShowCreate(false)}>Cancel</Button>
                <Button type="submit">Create</Button>
              </div>
            </form>
          </Modal>
        </div>
      );
    }

    function StackingSettings() {
      const [rules, setRules] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      React.useEffect(() => { API.get('/settings/stacking-rules').then(setRules).finally(() => setLoading(false)); }, []);

      if (loading) return <Spinner />;
      if (!rules) return null;

      const allTypes = ['bonus_cash', 'customer_cash', 'apr_cash', 'lease_cash', 'dealer_cash', 'cvp', 'demonstrator', 'loyalty', 'conquest', 'tactical'];
      const dealTypes = Object.keys(rules);

      return (
        <Card className="p-6">
          <h3 className="font-semibold text-onyx mb-4">Stacking Matrix</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-dove">
                  <th className="text-left px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Deal Type</th>
                  {allTypes.map(t => (
                    <th key={t} className="px-3 py-2 text-xs font-semibold text-silver-dust uppercase text-center">{t.replace('_', ' ')}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {dealTypes.map(dt => (
                  <tr key={dt} className="border-b border-dove/50">
                    <td className="px-3 py-2 font-medium capitalize">{dt}</td>
                    {allTypes.map(pt => (
                      <td key={pt} className="px-3 py-2 text-center">
                        {rules[dt]?.includes(pt) ? <span className="text-success font-bold">✓</span> : <span className="text-silver-dust">✗</span>}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      );
    }

    function MileageDegradeSettings() {
      const toast = React.useContext(ToastContext);
      const [table, setTable] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [saving, setSaving] = React.useState(false);

      React.useEffect(() => {
        API.get('/settings/mileage-degradation').then(setTable).finally(() => setLoading(false));
      }, []);

      const handleUpdate = (miles, val) => {
        setTable(t => ({...t, [miles]: parseFloat(val) || 0}));
      };

      const handleAddRow = () => {
        const miles = prompt('Enter annual mileage (e.g., 18000):');
        if (miles && !isNaN(Number(miles))) {
          const points = prompt('Enter residual point adjustment (e.g., -3):');
          if (points !== null) {
            setTable(t => ({...t, [miles]: parseFloat(points) || 0}));
          }
        }
      };

      const handleRemove = (miles) => {
        setTable(t => { const n = {...t}; delete n[miles]; return n; });
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          await API.put('/settings/mileage-degradation', table);
          toast.show('Mileage degradation table saved');
        } catch (e) { toast.show(e.message, 'error'); }
        finally { setSaving(false); }
      };

      if (loading) return <Spinner />;
      if (!table) return null;

      const sorted = Object.entries(table).sort((a, b) => Number(a[0]) - Number(b[0]));

      return (
        <Card className="p-6">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h3 className="font-semibold text-onyx">Lease Mileage Residual Degradation</h3>
              <p className="text-xs text-silver-dust mt-1">Residual percentage point adjustment from the base (10,000 mi/yr). Positive = higher residual, negative = lower.</p>
            </div>
            <div className="flex gap-2">
              <Button size="sm" variant="outline" onClick={handleAddRow}>+ Add Mileage</Button>
              <Button size="sm" onClick={handleSave} disabled={saving}>{saving ? 'Saving...' : 'Save'}</Button>
            </div>
          </div>
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b border-dove">
                <th className="text-left px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Annual Miles</th>
                <th className="text-center px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Residual Adjustment (points)</th>
                <th className="text-center px-3 py-2 text-xs font-semibold text-silver-dust uppercase">Effect</th>
                <th className="w-16"></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(([miles, pts]) => (
                <tr key={miles} className="border-b border-dove/50 hover:bg-dove/20">
                  <td className="px-3 py-2 font-medium">{Number(miles).toLocaleString()} mi/yr</td>
                  <td className="px-3 py-2 text-center">
                    <input type="number" value={pts} onChange={e => handleUpdate(miles, e.target.value)}
                      className="w-20 px-2 py-1 text-center border border-mushroom rounded text-sm" />
                  </td>
                  <td className="px-3 py-2 text-center">
                    {pts > 0 ? <span className="text-success font-medium">+{pts} pts (higher residual)</span>
                      : pts < 0 ? <span className="text-flare-red font-medium">{pts} pts (lower residual)</span>
                      : <span className="text-silver-dust">Base (no adjustment)</span>}
                  </td>
                  <td className="px-3 py-2 text-center">
                    {miles !== '10000' && (
                      <button onClick={() => handleRemove(miles)} className="text-error text-xs hover:underline">Remove</button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="mt-4 p-3 bg-mushroom-light rounded text-xs text-iron-smoke">
            <strong>How it works:</strong> The Santander lease file provides residual values at 10,000 mi/yr. When a dealer selects a different annual mileage in the Payment Estimator, these point adjustments are applied to the base residual. For example, if the base residual is 54% and the customer wants 15,000 mi/yr with a -2 point adjustment, the residual becomes 52%.
          </div>
        </Card>
      );
    }

    // ==================== App Root ====================
    function App() {
      const [user, setUser] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [page, setPage] = React.useState('dashboard');
      const [toasts, setToasts] = React.useState([]);

      const toastCtx = {
        show: (message, type = 'success') => {
          const id = Date.now();
          setToasts(t => [...t, { id, message, type }]);
        },
        dismiss: (id) => setToasts(t => t.filter(x => x.id !== id)),
      };

      React.useEffect(() => {
        if (API.token) {
          API.get('/auth/me').then(u => { setUser(u); }).catch(() => { API.clearToken(); }).finally(() => setLoading(false));
        } else {
          setLoading(false);
        }
      }, []);

      function handleLogin(u) {
        setUser(u);
        setPage(u.role === 'retailer' ? 'lookup' : 'dashboard');
      }

      function handleLogout() {
        API.post('/auth/logout').catch(() => {});
        API.clearToken();
        setUser(null);
      }

      if (loading) return <div className="min-h-screen flex items-center justify-center"><Spinner /></div>;
      if (!user) return (
        <ToastContext.Provider value={toastCtx}>
          <LoginPage onLogin={handleLogin} />
          {toasts.map(t => <Toast key={t.id} {...t} onClose={() => toastCtx.dismiss(t.id)} />)}
        </ToastContext.Provider>
      );

      const pages = { dashboard: DashboardPage, programs: ProgramsPage, codes: CodeMatrixPage, lookup: LookupPage, transactions: TransactionsPage, payfiles: PayFilesPage, settings: SettingsPage };
      const PageComponent = pages[page] || DashboardPage;

      return (
        <AuthContext.Provider value={{ user }}>
        <ToastContext.Provider value={toastCtx}>
          <div className="flex min-h-screen">
            <Sidebar user={user} currentPage={page} onNavigate={setPage} onLogout={handleLogout} />
            <main className="flex-1 p-6 overflow-auto bg-mushroom-light">
              <PageComponent />
            </main>
          </div>
          {toasts.map(t => <Toast key={t.id} {...t} onClose={() => toastCtx.dismiss(t.id)} />)}
        </ToastContext.Provider>
        </AuthContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
